<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — SACCI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --teal-deep: #0f4c3a; --teal: #1a6b5a; --teal-pale: #e8f4f0; --ink: #1a1a1a; --ink-muted: #7a7a7a; --cream: #FDFCFA; --sand: #e8e4df; --red: #991b1b; --font: 'DM Sans', sans-serif; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--cream); min-height: 100vh; display: flex; flex-direction: column; }
  .login-header { padding: 20px clamp(24px,4vw,48px); border-bottom: 1px solid var(--sand); display: flex; justify-content: space-between; align-items: center; }
  .login-header .brand-mark { font-family: var(--font); font-size: 1.2rem; font-weight: 700; color: var(--teal-deep); letter-spacing: 0.02em; text-decoration: none; }
  .login-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
  .login-card { width: 100%; max-width: 400px; background: #fff; border-radius: 12px; padding: 44px 36px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid rgba(15,76,58,0.08); }
  .login-icon { width: 52px; height: 52px; border-radius: 50%; background: var(--teal-pale); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
  .login-card h1 { font-size: 1.4rem; font-weight: 700; text-align: center; margin-bottom: 6px; }
  .login-card .sub { font-size: 0.88rem; color: var(--ink-muted); text-align: center; margin-bottom: 28px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--ink-muted); margin-bottom: 4px; }
  .form-group input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--sand); border-radius: 6px; font-family: var(--font); font-size: 0.9rem; outline: none; }
  .form-group input:focus { border-color: var(--teal); }
  .login-btn { width: 100%; padding: 13px; background: var(--teal-deep); color: #fff; border: none; border-radius: 6px; font-family: var(--font); font-size: 0.92rem; font-weight: 600; cursor: pointer; margin-top: 4px; }
  .login-btn:hover { background: var(--teal); }
  .login-btn:disabled { opacity: 0.6; cursor: default; }
  .login-error { display: none; background: #fef2f2; border: 1px solid #fecaca; color: var(--red); padding: 10px; border-radius: 6px; font-size: 0.84rem; margin-bottom: 14px; text-align: center; }
  .login-error.show { display: block; }
</style>
</head>
<body>

<div class="login-header">
  <a href="index.html" class="brand-mark">SACCI</a>
</div>

<div class="login-wrapper">
  <div class="login-card">
    <div class="login-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0f4c3a" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h1>Set a New Password</h1>
    <p class="sub" id="subText">Choose a new password for your account</p>

    <div class="login-error" id="errMsg"></div>

    <div id="resetFields">
      <div class="form-group"><label>New Password</label><input type="password" id="newPass" placeholder="At least 6 characters" autocomplete="new-password"></div>
      <div class="form-group"><label>Confirm Password</label><input type="password" id="confirmPass" placeholder="Re-enter password" autocomplete="new-password"></div>
      <button class="login-btn" id="saveBtn" onclick="savePassword()">Save Password</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script>
  function showErr(msg) {
    var el = document.getElementById('errMsg');
    el.textContent = msg;
    el.classList.add('show');
  }

  async function savePassword() {
    var p1 = document.getElementById('newPass').value;
    var p2 = document.getElementById('confirmPass').value;
    if (p1.length < 6) { showErr('Password must be at least 6 characters'); return; }
    if (p1 !== p2) { showErr('Passwords do not match'); return; }
    document.getElementById('saveBtn').disabled = true;
    var { error } = await sb.auth.updateUser({ password: p1 });
    document.getElementById('saveBtn').disabled = false;
    if (error) { showErr(error.message); return; }
    document.getElementById('resetFields').style.display = 'none';
    document.getElementById('subText').textContent = 'Password updated. Redirecting to the portal…';
    setTimeout(function() { window.location.href = 'portal.html'; }, 1800);
  }

  // The reset-link redirect lands here with a recovery session already active.
  (async function checkSession() {
    var { data: { session } } = await sb.auth.getSession();
    if (!session) {
      document.getElementById('resetFields').style.display = 'none';
      document.getElementById('subText').textContent = 'This reset link is invalid or has expired.';
      showErr('Request a new reset link from the login page.');
    }
  })();
</script>
</body>
</html>
